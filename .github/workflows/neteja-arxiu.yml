name: Neteja retroactiva arxiu
on:
  workflow_dispatch:      # nomes execucio manual

permissions:
  contents: write

jobs:
  netejar:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Dependencies
        run: pip install -r requirements.txt

      - name: Neteja retroactiva
        run: python scripts/neteja_arxiu.py

      - name: Commit i push
        run: |
          git config user.name  "radar-bot"
          git config user.email "radar-bot@noreply.github.com"
          git add data/
          if git diff --staged --quiet; then
            echo "Sense canvis."
          else
            git commit -m "🧹 Neteja retroactiva d'interferències de l'arxiu"
            git pull --rebase origin main
            git push
          fi
