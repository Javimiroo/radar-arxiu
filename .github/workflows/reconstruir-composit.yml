name: Reconstruir composits echotop
on:
  workflow_dispatch:      # nomes manual

permissions:
  contents: write

jobs:
  reconstruir:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Dependencies
        run: pip install -r requirements.txt

      - name: Reconstruir composits (sense radars exclosos)
        run: python scripts/reconstruir_composit.py

      - name: Commit i push (amb reintents)
        run: |
          git config user.name  "radar-bot"
          git config user.email "radar-bot@noreply.github.com"
          git add data/
          if git diff --staged --quiet; then
            echo "Sense canvis."
            exit 0
          fi
          git commit -m "🔧 Composits echotop reconstruïts sense LID"
          for i in 1 2 3 4 5 6; do
            echo "Intent de push $i..."
            git pull --rebase origin main || { sleep 15; continue; }
            if git push; then
              echo "Push OK a l'intent $i"
              exit 0
            fi
            sleep 15
          done
          echo "Push impossible després de 6 intents"
          exit 1
